<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación 30 Julieta</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:black;
    color:white;
    text-align:center;
    margin:0;
    overflow:hidden;
}

/* ✨ Animación fondo */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle, #ff0077 10%, transparent 10%) repeat;
    background-size: 50px 50px;
    animation: mover 10s linear infinite;
    opacity:0.15;
}

@keyframes mover{
    from{transform:translate(0,0)}
    to{transform:translate(-50px,-50px)}
}

h1{
    font-size:50px;
    color:gold;
    animation: brillo 2s infinite alternate;
}

@keyframes brillo{
    from{text-shadow:0 0 10px gold;}
    to{text-shadow:0 0 30px orange;}
}

.foto{
    width:280px;
    max-width:80%;
    border-radius:20px;
    box-shadow:0 0 20px pink;
    transition:1s;
}

.contenedor{
    margin-top:30px;
}

button{
    padding:15px 30px;
    font-size:18px;
    background:#ff0077;
    border:none;
    border-radius:20px;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#ff3399;
}

.qr{
    margin-top:20px;
    width:150px;
}
</style>
</head>

<body onclick="activarAudio()">

<h2>De esto...</h2>

<div class="contenedor">
    <img id="foto" class="foto" src="adulta.jpg">
</div>

<h2 id="texto">Adulta</h2>

<h1>¡Voy a cumplir 30!</h1>

<p>30 de Mayo - 13:30 hs</p>
<p>Quinta Guernica - Japón 2455</p>

<button onclick="abrirMapa()">Ver ubicación</button>

<br><br>

<h3>Sumá tu canción</h3>

<img class="qr" src="qr_playlist.png">

<br><br>

<button onclick="play()">Activar música</button>

<audio id="musica" loop autoplay muted>
    <source src="rafaga.mp3" type="audio/mpeg">
</audio>

<script>
// 🔁 Ahora empieza desde adulta
let fotos = ["adulta.jpg","adolescente.jpg","bebe.jpg"]
let textos = ["Adulta","Adolescente","Bebé"]

let i=0

setInterval(()=>{
    i++
    if(i>2){i=0}
    document.getElementById("foto").src=fotos[i]
    document.getElementById("texto").innerHTML=textos[i]
},2500)

// 🎵 Autoplay inteligente
let musica = document.getElementById("musica")

function activarAudio(){
    musica.muted = false
    musica.play()
}

// Botón manual
function play(){
    musica.muted = false
    musica.play()
}

function abrirMapa(){
    window.open("https://maps.google.com/?q=Japón+2455+Guernica+Buenos+Aires")
}

// intento automático al cargar
window.onload = () => {
    musica.play().catch(()=>{})
}
</script>

</body>
</html>
